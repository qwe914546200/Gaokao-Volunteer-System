<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考志愿填报模拟系统 - 智慧升学平台</title>
<style>
/* ==================== 全局重置与变量 ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1677FF;--primary-light:#E8F3FF;--primary-dark:#0958D9;--primary-hover:#E6F0FF;
  --bg:#F5F7FA;--card:#FFFFFF;
  --text:#1D2129;--text2:#4E5969;--text3:#86909C;--text4:#C9CDD4;
  --reach:#FF4D4F;--reach-bg:#FFF1F0;
  --safe:#FAAD14;--safe-bg:#FFFBE6;
  --guarantee:#52C41A;--guarantee-bg:#F6FFED;
  --danger:#FF4D4F;--danger-bg:#FFF1F0;--danger-border:#FFA39E;
  --border:#E5E6EB;--radius:10px;--radius-sm:6px;
  --shadow:0 1px 4px rgba(0,0,0,.06);--shadow-lg:0 4px 16px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth;font-size:14px}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C9CDD4;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#86909C}
a{text-decoration:none;color:inherit}button{font-family:inherit}input,select{font-family:inherit}

/* ==================== 动画 ==================== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,119,255,.35)}70%{box-shadow:0 0 0 10px rgba(22,119,255,0)}}
@keyframes marquee{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes tagPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes dashDraw{from{stroke-dashoffset:800}to{stroke-dashoffset:0}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}

/* ==================================================================
   顶部导航栏 - 完整样式（吸顶 + Logo + 导航项 + 响应式折叠）
   ================================================================== */

/* 导航栏容器：固定吸顶，毛玻璃背景 */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:5000;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;
  transition:box-shadow .3s ease, border-color .3s ease;
}
/* 滚动时增加阴影，视觉上"浮起" */
.top-nav.scrolled{
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  border-bottom-color:transparent;
}

/* ---------- 左侧 Logo 区 ---------- */
.nav-brand{
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  cursor:pointer;
  transition:transform .2s ease;
  text-decoration:none;
}
.nav-brand:hover{transform:scale(1.02)}
.nav-brand:active{transform:scale(.99)}

/* Logo 图标容器 - 书本+学士帽组合 */
.nav-logo-icon{
  width:38px;height:38px;
  border-radius:10px;
  background:linear-gradient(135deg,#1677FF 0%,#4096FF 100%);
  box-shadow:0 2px 8px rgba(22,119,255,.25);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  flex-shrink:0;
  transition:box-shadow .3s, transform .3s;
}
.nav-brand:hover .nav-logo-icon{
  box-shadow:0 4px 14px rgba(22,119,255,.35);
  animation:logoFloat 1.5s ease infinite;
}

/* SVG 学士帽+书本图标（内嵌在 HTML 中） */
.nav-logo-icon svg{
  width:22px;height:22px;
  fill:#FFFFFF;
}

/* 品牌名文字 */
.nav-brand-text{
  font-size:18px;
  font-weight:800;
  color:var(--primary);
  letter-spacing:.5px;
  line-height:1.2;
  user-select:none;
  transition:color .2s;
}
.nav-brand:hover .nav-brand-text{
  color:var(--primary-dark);
}
/* "平台" 两字可做细微视觉区分 */
.nav-brand-text .sub{
  font-weight:600;
  opacity:.85;
}

/* ---------- 中部导航链接区 ---------- */
.nav-links{
  display:flex;
  align-items:center;
  gap:2px;
  /* 居中展示 */
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}
.nav-link{
  position:relative;
  padding:7px 16px;
  font-size:14px;
  font-weight:500;
  color:var(--text2);
  border-radius:var(--radius-sm);
  transition:all .2s ease;
  cursor:pointer;
  white-space:nowrap;
  user-select:none;
}
.nav-link:hover{
  color:var(--primary);
  background:var(--primary-hover);
}
.nav-link:active{
  background:#D6E4FF;
}
/* 当前激活项 */
.nav-link.active{
  color:var(--primary);
  font-weight:700;
}
.nav-link.active::after{
  content:'';
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:20px;height:3px;
  background:var(--primary);
  border-radius:2px;
}

/* 「高校目录」NEW 角标 */
.nav-link .badge-new{
  position:absolute;
  top:-2px;right:0;
  font-size:9px;
  line-height:14px;
  padding:0 5px;
  background:var(--danger);
  color:#fff;
  border-radius:7px;
  font-weight:700;
  letter-spacing:.5px;
  box-shadow:0 1px 4px rgba(255,77,79,.3);
  animation:pulse 2.5s ease infinite;
}

/* ---------- 右侧留白区 ---------- */
.nav-right-spacer{
  width:38px;
  flex-shrink:0;
}

/* ---------- 移动端汉堡按钮 ---------- */
.nav-hamburger{
  display:none;
  width:36px;height:36px;
  border:none;background:transparent;
  cursor:pointer;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:5px;
  padding:4px;
  border-radius:var(--radius-sm);
  transition:background .2s;
}
.nav-hamburger:hover{background:var(--primary-hover)}
.nav-hamburger span{
  display:block;
  width:20px;height:2px;
  background:var(--text2);
  border-radius:1px;
  transition:all .3s;
}
.nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hamburger.open span:nth-child(2){opacity:0}
.nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ---------- 移动端折叠菜单 ---------- */
.nav-mobile-menu{
  display:none;
  position:fixed;
  top:60px;left:0;right:0;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  padding:8px 16px 16px;
  flex-direction:column;
  gap:2px;
  animation:fadeUp .25s ease;
  z-index:4999;
}
.nav-mobile-menu.open{display:flex}
.nav-mobile-menu .nav-link{
  padding:12px 16px;
  border-radius:var(--radius-sm);
  font-size:15px;
}
.nav-mobile-menu .nav-link.active::after{display:none}
.nav-mobile-menu .nav-link.active{background:var(--primary-hover)}

/* ---------- 响应式：平板及以下折叠 ---------- */
@media(max-width:960px){
  .nav-links{display:none !important}
  .nav-hamburger{display:flex}
  .nav-right-spacer{display:none}
  .top-nav{padding:0 16px}
}

/* ==================================================================
   声明弹窗
   ================================================================== */
.disclaimer-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);animation:fadeIn .3s}
.disclaimer-overlay.hidden{display:none}
.disclaimer-modal{background:#fff;border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .4s ease}
.disclaimer-modal-header{padding:28px 32px 0;text-align:center}
.disclaimer-modal-header .warn-icon{display:inline-flex;width:56px;height:56px;border-radius:50%;background:var(--danger-bg);align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;border:2px solid var(--danger-border)}
.disclaimer-modal-header h2{font-size:22px;color:var(--danger);font-weight:800;margin-bottom:4px}
.disclaimer-modal-header p{font-size:13px;color:var(--text3)}
.disclaimer-modal-body{padding:20px 32px}
.disclaimer-modal-body ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.disclaimer-modal-body li{display:flex;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);background:#FAFAFA;border-left:3px solid var(--danger);font-size:13px;color:var(--text);line-height:1.75}
.disclaimer-modal-body li strong{color:var(--danger)}
.disclaimer-modal-body li .label{flex-shrink:0;font-size:11px;background:var(--danger-bg);color:var(--danger);padding:2px 8px;border-radius:3px;font-weight:700;height:fit-content;margin-top:2px}
.disclaimer-highlight-box{margin:16px 0;padding:14px 18px;background:var(--danger-bg);border:2px solid var(--danger);border-radius:var(--radius-sm);text-align:center;font-size:14px;font-weight:700;color:var(--danger);line-height:1.8}
.disclaimer-highlight-box .underline{text-decoration:underline;text-underline-offset:3px}
.disclaimer-modal-footer{padding:8px 32px 28px;display:flex;flex-direction:column;align-items:center;gap:14px}
.disclaimer-check{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--text);font-weight:600;user-select:none}
.disclaimer-check input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary);cursor:pointer}
.disclaimer-confirm-btn{width:100%;max-width:360px;height:48px;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:not-allowed;background:#C9CDD4;color:#fff;transition:all .3s}
.disclaimer-confirm-btn.enabled{background:var(--primary);cursor:pointer;animation:pulse 2s infinite}
.disclaimer-confirm-btn.enabled:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(22,119,255,.4)}

/* 内容锁定状态 */
.content-locked{pointer-events:none;opacity:.35;filter:blur(2px);transition:all .5s;user-select:none}
.content-unlocked{pointer-events:auto;opacity:1;filter:none;transition:all .5s}

/* ==================================================================
   公告滚动条
   ================================================================== */
.announce-bar{margin-top:60px;background:linear-gradient(90deg,var(--primary-light),#F0F7FF,var(--primary-light));padding:8px 32px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #D6E4FF;overflow:hidden}
.announce-badge{flex-shrink:0;background:var(--primary);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.announce-scroll{flex:1;overflow:hidden;height:20px;position:relative}
.announce-text{position:absolute;white-space:nowrap;animation:marquee 35s linear infinite;font-size:12px;color:var(--text2);line-height:20px}
.announce-text:hover{animation-play-state:paused}
.announce-text span{margin-right:48px}

/* ==================================================================
   主内容区
   ================================================================== */
.main-wrap{max-width:1400px;margin:0 auto;padding:20px 32px 48px}
.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-title .ic{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px}
.section-title .ic.blue{background:var(--primary-light);color:var(--primary)}
.section-title .ic.orange{background:var(--safe-bg);color:var(--safe)}
.section-title .ic.green{background:var(--guarantee-bg);color:var(--guarantee)}
.section-sub{font-size:12px;color:var(--text3);margin-top:2px}
.section-motto{font-size:12px;color:var(--primary);background:var(--primary-light);padding:4px 12px;border-radius:14px}
.section-more{font-size:12px;color:var(--primary);cursor:pointer;transition:all .2s}
.section-more:hover{opacity:.7}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:all .3s}
.card:hover{box-shadow:var(--shadow-lg);border-color:transparent}

/* Hero 区
